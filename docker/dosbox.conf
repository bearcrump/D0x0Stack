[dosbox]
machine=svga_s3
memsize=16

[autoexec]
# Mount /doslab/src as C:\SRC in DOSBox
mount C /doslab/src
C:
cls
echo ===========================================
echo Welcome to Node A DOSBox-X
echo ===========================================
echo Your /doslab/src folder is mounted as C:\SRC
echo Run OPEN-WATCOM-C-DOS-1.9.EXE to install Open Watcom
echo.
pause

[serial]
serial1=nullmodem server:0.0.0.0 port:5000
serial2=disabled

[mounts]
mount c /doslab/src
c:

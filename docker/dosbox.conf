[dosbox]
# Machine type for DOS programs (headless, graphics don't matter)
machine=hercules
memsize=16

[cpu]
# Basic CPU emulation, enough for DOS apps
core=auto
cycles=auto

[mixer]
# Headless audio (won't output sound in container)
nosound=true

[sdl]
# No GUI window
output=surface
fullscreen=false
windowresolution=1024x768
priority=higher,normal

[midi]
# MIDI disabled
mpu401=intelligent
mididevice=none
midiconfig=

[autoexec]
# Mount your host src folder as C:
mount C /doslab/src
C:
# Start DOS prompt
command.com

[serial]
# Null-modem server on all interfaces at port 5000
serial1=nullmodem server:0.0.0.0 port:5000
serial2=disabled

[dos]
# DOS version and keyboard layout defaults
keyboardlayout=us

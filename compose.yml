services:
  node-a:
    build:
      context: ./docker
      dockerfile: Dockerfile
    volumes:
      - ./src:/doslab/src
      - ./open-watcom:/doslab/open-watcom
      - ./docker/dosbox.conf:/doslab/dosbox.conf
    tty: true
    stdin_open: true
    ports:
      - "5000:5000"

  node-b:
    build:
      context: ./docker
      dockerfile: Dockerfile
    volumes:
      - ./src:/doslab/src
      - ./open-watcom:/doslab/open-watcom
      - ./docker/dosbox-b.conf:/doslab/dosbox.conf
    tty: true
    stdin_open: true
